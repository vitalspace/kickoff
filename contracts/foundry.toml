[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# Allow scripts to write deployment artefacts into ./deployments/
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# Local Anvil defaults — `make deploy` / `forge script` will pick these up
[rpc_endpoints]
local = "http://127.0.0.1:8545"
arbitrumSepolia = "https://sepolia-rollup.arbitrum.io/rpc"

[etherscan]
anvil = { key = "anonymous", url = "http://127.0.0.1:8545" }
